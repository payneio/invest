<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px/1.4 system-ui, sans-serif; width: 280px; padding: 12px; margin: 0; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .row { display: flex; align-items: center; gap: 6px; margin: 6px 0; }
      label { flex: 1; }
      input { width: 60px; padding: 2px 4px; }
      button { width: 100%; padding: 8px; margin-top: 8px; font-weight: 600; cursor: pointer; }
      #status { margin-top: 10px; white-space: pre-wrap; color: #333; min-height: 32px; }
      .hint { color: #777; font-size: 11px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Fidelity Activity Exporter</h1>
    <div class="row"><label for="years">Years back</label><input id="years" type="number" value="5" min="0.1" step="0.5" /></div>
    <div class="row"><label for="win">Window (days)</label><input id="win" type="number" value="90" min="1" max="93" /></div>
    <button id="go">Export to JSON</button>
    <div id="status"></div>
    <div class="hint">Open your Fidelity <b>Activity</b> page and let it load once before exporting. Progress prints to that page's console.</div>
    <script src="popup.js"></script>
  </body>
</html>
